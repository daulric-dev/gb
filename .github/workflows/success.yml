name: Notify Workflow Results

on:
  workflow_dispatch:
  workflow_run:
    branches:
      - "**"
    workflows:
      - App Build
      - Codecov Tests and Upload Coverage
      - Lines of Code
      - Security Scanning
      - Repository file sizes
    types:
      - completed

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check monitored workflow status for this commit
        if: ${{ github.event_name == 'workflow_run' }}
        id: status
        uses: actions/github-script@v8
        with:
          script: |
            const script = require('./.github/scripts/check-workflow-status.js');
            await script({ github, context, core });

      - name: Prepare manual dispatch status output
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: status_manual
        run: |
          echo "all_success=true" >> "$GITHUB_OUTPUT"
          echo "has_failures=false" >> "$GITHUB_OUTPUT"
          echo "details=- Manual workflow_dispatch test run" >> "$GITHUB_OUTPUT"
          echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "event_name=workflow_dispatch" >> "$GITHUB_OUTPUT"
          echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "changes_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Show notification decision
        run: |
          echo "workflow event: ${{ github.event_name }}"
          echo "all_success: ${{ steps.status.outputs.all_success || steps.status_manual.outputs.all_success }}"
          echo "has_failures: ${{ steps.status.outputs.has_failures || steps.status_manual.outputs.has_failures }}"
          echo "details:"
          echo "${{ steps.status.outputs.details || steps.status_manual.outputs.details }}"

      - name: Send Discord success notification
        if: ${{ steps.status.outputs.all_success == 'true' || steps.status_manual.outputs.all_success == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EMBED_TITLE: "✅ All Workflows Passed"
          EMBED_DESCRIPTION: |
            All monitored CI workflows completed successfully.

            **Repository:** `${{ github.repository }}`
            **Branch:** `${{ steps.status.outputs.head_branch || github.ref_name }}`
            **Event:** `${{ steps.status.outputs.event_name || steps.status_manual.outputs.event_name }}`
            **Commit:** `${{ steps.status.outputs.head_sha || steps.status_manual.outputs.head_sha }}`

            **Results:**
            ${{ steps.status.outputs.details || steps.status_manual.outputs.details }}

            [View Changes](${{ steps.status.outputs.changes_url || steps.status_manual.outputs.changes_url }}) · [View Workflow Run](${{ steps.status.outputs.run_url || steps.status_manual.outputs.run_url }})
          EMBED_COLOR: "3066993"
          CHANGES_URL: ${{ steps.status.outputs.changes_url || steps.status_manual.outputs.changes_url }}
        run: python3 .github/scripts/discord-notify.py

      - name: Send Discord failure notification
        if: ${{ steps.status.outputs.has_failures == 'true' && steps.status.outputs.all_complete == 'true' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          EMBED_TITLE: "❌ ${{ steps.status.outputs.failed_count }} Workflow(s) Failed"
          EMBED_DESCRIPTION: |
            Some CI workflows failed on this commit.

            **Repository:** `${{ github.repository }}`
            **Branch:** `${{ steps.status.outputs.head_branch }}`
            **Event:** `${{ steps.status.outputs.event_name }}`
            **Commit:** `${{ steps.status.outputs.head_sha }}`

            **Failed:**
            ${{ steps.status.outputs.failed_details }}

            **All Results:**
            ${{ steps.status.outputs.details }}

            [View Changes](${{ steps.status.outputs.changes_url }}) · [View Workflow Run](${{ steps.status.outputs.run_url }})
          EMBED_COLOR: "15158332"
          CHANGES_URL: ${{ steps.status.outputs.changes_url }}
        run: python3 .github/scripts/discord-notify.py
