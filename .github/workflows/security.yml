name: Security Scanning

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6am UTC

permissions:
  contents: read

jobs:
  # 1. SCA - Dependency vulnerability scanning
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install

      # OSV-Scanner (Google)
      - name: Install OSV-Scanner
        run: bash .github/scripts/install-osv-scanner.sh

      - name: Run OSV-Scanner
        run: osv-scanner -r . --format table 2>&1 | tee osv-report.txt
        continue-on-error: true

      # Trivy filesystem scan
      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-report.txt
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload dependency scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-report
          path: |
            osv-report.txt
            trivy-report.txt
          retention-days: 30

  # 3. Secret Detection
  secrets-scan:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Gitleaks
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      # TruffleHog
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

      - name: Run TruffleHog (report file)
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:latest git file:///repo --only-verified 2>&1 | tee trufflehog-report.txt || true
        continue-on-error: true

      - name: Upload secret detection reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: |
            results.sarif
            trufflehog-report.txt
          if-no-files-found: ignore
          retention-days: 30

  # 4. Snyk - Open-source vulnerability scan
  snyk:
    name: Snyk Scan
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install

      - name: Install Snyk CLI
        run: bun add -g snyk

      - name: Run Snyk (backend)
        continue-on-error: true
        run: snyk test --file=backend/package.json --severity-threshold=high 2>&1 | tee snyk-backend-report.txt

      - name: Run Snyk (frontend)
        continue-on-error: true
        run: snyk test --file=frontend/package.json --severity-threshold=high 2>&1 | tee snyk-frontend-report.txt

      - name: Upload Snyk reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: |
            snyk-backend-report.txt
            snyk-frontend-report.txt
          if-no-files-found: ignore
          retention-days: 30
