name: Infrastructure

on:
  push:
    paths:
      - "infrastructure/**"
  pull_request:
    paths:
      - "infrastructure/**"

jobs:
  nginx:
    name: Validate Nginx Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test nginx config syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v ${{ github.workspace }}/infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine nginx -t

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f infrastructure/docker-compose.yml config

      - name: Build all services
        run: docker compose -f infrastructure/docker-compose.yml build

  smoke-test:
    name: Smoke Test Stack
    needs: [nginx, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start the stack
        run: docker compose -f infrastructure/docker-compose.yml up -d --build
        env:
          SUPABASE_URL: "http://localhost:54321"
          SUPABASE_SERVICE_ROLE_KEY: "test-key"
          SUPABASE_PUSHABLE_KEY: "test-key"

      - name: Wait for services to be ready
        run: |
          echo "Waiting for containers to start..."
          sleep 10
          docker compose -f infrastructure/docker-compose.yml ps

      - name: Verify nginx is listening
        run: |
          for i in $(seq 1 5); do
            if curl -sf -o /dev/null http://localhost; then
              echo "nginx is responding"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "nginx never became ready"
          exit 1

      - name: Show logs on failure
        if: failure()
        run: docker compose -f infrastructure/docker-compose.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f infrastructure/docker-compose.yml down -v
