name: Infrastructure

on:
  push:
    paths:
      - "infrastructure/**"
  pull_request:
    paths:
      - "infrastructure/**"

jobs:
  nginx:
    name: Validate Nginx Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test nginx config syntax
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v ${{ github.workspace }}/infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine nginx -t

  reverse-proxy:
    name: Test Reverse Proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start mock upstream servers on ports 3004 3005 3006
        run: |
          for port in 3004 3005 3006; do
            python3 -c "
          import http.server, socketserver, threading
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  body = b'ok from $port'
                  self.send_response(200)
                  self.send_header('Content-Length', len(body))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a): pass
          httpd = socketserver.TCPServer(('', $port), H)
          httpd.serve_forever()
          " &
          done
          sleep 1

      - name: Start nginx with host networking
        run: |
          docker run -d --name nginx_test \
            --network host \
            -v ${{ github.workspace }}/infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v ${{ github.workspace }}/infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine
          sleep 2

      - name: Ping upstream ports directly (3004, 3005, 3006)
        run: |
          for port in 3004 3005 3006; do
            response=$(curl -sf http://localhost:$port || echo "FAILED")
            echo "localhost:$port → $response"
            [ "$response" != "FAILED" ] || { echo "Upstream port $port is not responding"; exit 1; }
          done

      - name: Ping through reverse proxy - verify all 3 upstreams are reached
        run: |
          hit_3004=0; hit_3005=0; hit_3006=0; success=0
          for i in $(seq 1 9); do
            response=$(curl -sf http://localhost || echo "FAILED")
            echo "Request $i: $response"
            if [[ "$response" != "FAILED" ]]; then
              success=$((success + 1))
              [[ "$response" == *"3004"* ]] && hit_3004=1
              [[ "$response" == *"3005"* ]] && hit_3005=1
              [[ "$response" == *"3006"* ]] && hit_3006=1
            fi
          done
          echo "$success/9 requests succeeded"
          echo "Ports reached - 3004:$hit_3004  3005:$hit_3005  3006:$hit_3006"
          [ $success -eq 9 ] || { echo "Not all requests succeeded"; exit 1; }
          [ $hit_3004 -eq 1 ] && [ $hit_3005 -eq 1 ] && [ $hit_3006 -eq 1 ] \
            || { echo "Not all 3 upstream ports were reached"; exit 1; }

      - name: Show nginx logs on failure
        if: failure()
        run: docker logs nginx_test

      - name: Cleanup
        if: always()
        run: docker rm -f nginx_test || true

  docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f infrastructure/docker-compose.yml config
