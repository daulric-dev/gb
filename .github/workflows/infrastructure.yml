name: Infrastructure

on:
  push:
    paths:
      - "infrastructure/**"
      - ".github/workflows/infrastructure.yml"
  pull_request:
    paths:
      - "infrastructure/**"
      - ".github/workflows/infrastructure.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f infrastructure/Dockerfile -t gb-backend:ci .
