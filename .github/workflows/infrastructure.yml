name: Infrastructure

on:
  push:
    paths:
      - "infrastructure/**"
  pull_request:
    paths:
      - "infrastructure/**"

jobs:
  nginx:
    name: Validate Nginx Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test nginx config syntax
        run: ./.github/scripts/validate-nginx.sh

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f infrastructure/docker-compose.yml config

      - name: Build all services
        run: docker compose -f infrastructure/docker-compose.yml build

  reverse-proxy:
    name: Test Reverse Proxy
    needs: [nginx, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start mock upstream servers
        run: ./.github/scripts/start-mock-upstreams.sh

      - name: Start nginx with host networking
        run: ./.github/scripts/start-nginx-test.sh

      - name: Verify reverse proxy routing
        run: ./.github/scripts/test-reverse-proxy.sh

      - name: Show nginx logs on failure
        if: failure()
        run: docker logs nginx_test

      - name: Cleanup
        if: always()
        run: docker rm -f nginx_test || true
