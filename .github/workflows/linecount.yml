name: Lines of Code

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  count-loc:
    name: Count Lines of Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloc
        run: sudo apt-get install -y cloc

      - name: Count lines of code
        run: bash .github/scripts/linecount.sh

      - name: Frontend breakdown
        run: bash .github/scripts/linecount-frontend.sh

      - name: Backend breakdown
        run: bash .github/scripts/linecount-backend.sh
