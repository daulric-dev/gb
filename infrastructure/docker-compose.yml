x-app: &app
  build:
    context: ..
    dockerfile: infrastructure/Dockerfile
  # Supabase keys, FRONTEND_URL, NODE_ENV, etc. come from .env (see env.example).
  env_file:
    - .env
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
  networks:
    - appnet
  healthcheck:
    # Hits the backend root route (returns 200). No curl/wget in the bun image,
    # so use bun itself.
    test:
      - CMD
      - bun
      - -e
      - "fetch('http://localhost:'+(process.env.PORT||3001)).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 20s

# Redis connection for the app replicas, resolved over the Compose network.
# Overrides whatever REDIS_URL/USE_REDIS may be in .env so the in-cluster
# Redis is always used regardless of the host-oriented .env values.
x-app-env: &app-env
  USE_REDIS: "true"
  REDIS_URL: "redis://redis:6379"

services:
  app1:
    <<: *app
    environment:
      <<: *app-env
      PORT: "3004"

  app2:
    <<: *app
    environment:
      <<: *app-env
      PORT: "3005"

  app3:
    <<: *app
    environment:
      <<: *app-env
      PORT: "3006"

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # enable once TLS is terminated here (see default.conf)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy

networks:
  appnet:
    driver: bridge

volumes:
  redis-data:
