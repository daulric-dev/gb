version: '3'
services:
  app1:
    build: .
    environment:
      - PORT=3004

  app2:
    build: .
    environment:
      - PORT=3005

  app3:
    build: .
    environment:
      - PORT=3006

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app1
      - app2
      - app3