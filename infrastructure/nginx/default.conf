upstream backend_load_balancer {
    server app1:3004;
    server app2:3005;
    server app3:3006;
}

# Don't leak the nginx version in Server: headers or error pages.
server_tokens off;

# Shared proxy settings, reused by the HTTP and HTTPS servers below.
# X-Real-IP must be $remote_addr (the actual TCP peer), not $host
# (the attacker-controlled Host header) - downstream rate-limiting and
# audit logging key off this value.
map $http_x_forwarded_proto $proxied_scheme {
    default $scheme;
    https   https;
}

server {
    listen 80;

    # Reject body uploads larger than the avatar/PDF cap. Without this,
    # default nginx 1MB limit would silently 413 valid 5MB uploads, and
    # an attacker could DoS the backend with unbounded payloads.
    client_max_body_size 16m;

    location / {
        proxy_pass http://backend_load_balancer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxied_scheme;

        # Defense-in-depth security headers. Most of these are also
        # appropriate to set in next.config.ts; setting them here means
        # they apply to backend responses (Swagger, raw API) too.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'" always;
    }
}

